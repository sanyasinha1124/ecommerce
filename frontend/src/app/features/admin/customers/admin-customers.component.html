<div class="admin-page">
  <div class="admin-page__header">
    <div>
      <h1 class="admin-page__title">Customers</h1>
      <p class="admin-page__subtitle">{{ customers.length }} registered customers</p>
    </div>
  </div>

  <div *ngIf="success" class="alert alert-success">{{ success }}</div>

  <div *ngIf="loading" class="admin-loading">
    <div class="spinner" style="width:36px;height:36px;border-width:3px;"></div>
  </div>

  <div *ngIf="!loading" class="admin-table-wrap">
    <table class="admin-table">
      <thead>
        <tr><th>Name</th><th>Email</th><th>Status</th><th>Action</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of customers">
          <td class="fw-600">{{ c.name }}</td>
          <td>{{ c.email }}</td>
          <td>
            <span [class]="c.isLocked ? 'badge badge-red' : 'badge badge-green'">
              {{ c.isLocked ? '🔒 Locked' : '✓ Active' }}
            </span>
          </td>
          <td>
            <button
              [class]="c.isLocked ? 'btn btn-outline btn-sm' : 'btn btn-sm lock-btn'"
              [disabled]="togglingId === c.id"
              (click)="toggleLock(c.id)">
              <span *ngIf="togglingId===c.id" class="spinner" style="width:12px;height:12px;border-width:2px;"></span>
              {{ c.isLocked ? 'Unlock Account' : 'Lock Account' }}
            </button>
          </td>
        </tr>
      </tbody>
    </table>
    <div *ngIf="customers.length===0" class="empty-state">
      <div class="empty-state__icon">👥</div>
      <h3 class="empty-state__title">No customers yet</h3>
    </div>
  </div>
</div>
