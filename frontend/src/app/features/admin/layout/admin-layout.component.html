    <nav style="
        display: flex; 
        justify-content: center; 
        gap: 60px; 
        padding: 15px 0;
        background: var(--noir-white);
    ">
      <a routerLink="/admin/products" routerLinkActive="active" style="
          text-decoration: none; 
          color: var(--noir-black); 
          font-family: monospace; 
          font-size: 13px; 
          font-weight: 800; 
          text-transform: uppercase; 
          letter-spacing: 2px;
          padding-bottom: 5px;
          border-bottom: 3px solid transparent;
          transition: all 0.3s ease;
      " onmouseover="this.style.borderBottom='3px solid black'" onmouseout="this.style.borderBottom='3px solid transparent'">
        🧾Products
      </a>
      
      <a routerLink="/admin/customers" routerLinkActive="active" style="
          text-decoration: none; 
          color: var(--noir-black); 
          font-family: monospace; 
          font-size: 13px; 
          font-weight: 800; 
          text-transform: uppercase; 
          letter-spacing: 2px;
          padding-bottom: 5px;
          border-bottom: 3px solid transparent;
          transition: all 0.3s ease;
      " onmouseover="this.style.borderBottom='3px solid black'" onmouseout="this.style.borderBottom='3px solid transparent'">
        👥 Customers
      </a>
      
      <a routerLink="/admin/orders" routerLinkActive="active" style="
          text-decoration: none; 
          color: var(--noir-black); 
          font-family: monospace; 
          font-size: 13px; 
          font-weight: 800; 
          text-transform: uppercase; 
          letter-spacing: 2px;
          padding-bottom: 5px;
          border-bottom: 3px solid transparent;
          transition: all 0.3s ease;
      " onmouseover="this.style.borderBottom='3px solid black'" onmouseout="this.style.borderBottom='3px solid transparent'">
        📦Orders
      </a>
    </nav>
  <!-- </header> -->

  <main style="
      flex: 1;
      padding: 40px;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
      animation: fadeIn 0.5s ease-in;
  ">
    <router-outlet></router-outlet>
  </main>

  <footer style="
      padding: 40px; 
      border-top: 1px solid #eeeeee; 
      text-align: center; 
      font-family: monospace; 
      font-size: 10px; 
      text-transform: uppercase; 
      letter-spacing: 3px; 
      color: #999;
  ">
    © StyleHub Noir System // All Rights Reserved 2026
  </footer>
</div>

<style>
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .active {
    border-bottom: 3px solid black !important;
  }
</style>
