<div class="admin-shell" style="
    --pink: #ff3f6c;
    --white: #ffffff;
    --charcoal: #282c3f;
    --grey-light: #f5f5f6;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background: var(--white);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
">

    <nav style="
        display: flex; 
        justify-content: center; 
        gap: 60px; 
        padding: 20px 0;
        background: var(--white);
        border-bottom: 1px solid #eaeaec;
    ">
      <a routerLink="/admin/products" routerLinkActive="active" style="
          text-decoration: none; 
          color: var(--charcoal); 
          font-family: 'Segoe UI', sans-serif; 
          font-size: 13px; 
          font-weight: 700; 
          text-transform: uppercase; 
          letter-spacing: 1px;
          padding-bottom: 8px;
          border-bottom: 3px solid transparent;
          transition: all 0.2s ease;
      " onmouseover="this.style.color='var(--pink)'" onmouseout="if(!this.classList.contains('active')) this.style.color='var(--charcoal)'">
        🧾 Products
      </a>
      
      <a routerLink="/admin/customers" routerLinkActive="active" style="
          text-decoration: none; 
          color: var(--charcoal); 
          font-family: 'Segoe UI', sans-serif; 
          font-size: 13px; 
          font-weight: 700; 
          text-transform: uppercase; 
          letter-spacing: 1px;
          padding-bottom: 8px;
          border-bottom: 3px solid transparent;
          transition: all 0.2s ease;
      " onmouseover="this.style.color='var(--pink)'" onmouseout="if(!this.classList.contains('active')) this.style.color='var(--charcoal)'">
        👥 Customers
      </a>
      
      <a routerLink="/admin/orders" routerLinkActive="active" style="
          text-decoration: none; 
          color: var(--charcoal); 
          font-family: 'Segoe UI', sans-serif; 
          font-size: 13px; 
          font-weight: 700; 
          text-transform: uppercase; 
          letter-spacing: 1px;
          padding-bottom: 8px;
          border-bottom: 3px solid transparent;
          transition: all 0.2s ease;
      " onmouseover="this.style.color='var(--pink)'" onmouseout="if(!this.classList.contains('active')) this.style.color='var(--charcoal)'">
        📦 Orders
      </a>
    </nav>

  <main style="
      flex: 1;
      padding: 40px;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
      animation: fadeIn 0.4s ease-out;
  ">
    <router-outlet></router-outlet>
  </main>

  <footer style="
      padding: 30px; 
      border-top: 1px solid #eeeeee; 
      text-align: center; 
      font-family: 'Segoe UI', sans-serif; 
      font-size: 11px; 
      font-weight: 600;
      text-transform: uppercase; 
      letter-spacing: 1.5px; 
      color: #94969f;
  ">
    © StyleHub Management System // 2026
  </footer>
</div>

<style>
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  /* Angular Active Link Styling */
  .active {
    color: #ff3f6c !important;
    border-bottom: 3px solid #ff3f6c !important;
  }
</style>
