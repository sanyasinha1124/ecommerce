<div class="auth-page">
  <div class="auth-card fade-up">
    <h2 class="auth-card__title">Change Password</h2>
    <div *ngIf="error" class="alert alert-error">{{ error }}</div>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label">Current Password</label>
        <input type="password" formControlName="currentPassword" class="form-control" placeholder="Enter current password" />
        <div *ngIf="form.get('currentPassword')?.invalid && form.get('currentPassword')?.touched" class="form-error">Current password is required</div>
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" formControlName="newPassword" class="form-control" placeholder="Min 8 chars, 1 uppercase, 1 number" />
        <div *ngIf="form.get('newPassword')?.invalid && form.get('newPassword')?.touched" class="form-error">Password must be 8+ chars with 1 uppercase & 1 number</div>
      </div>
      <button type="submit" class="btn btn-primary btn-full" [disabled]="loading">
        <span *ngIf="loading" class="spinner"></span>
        {{ loading ? 'Changing...' : 'Change Password' }}
      </button>
    </form>
    <p class="auth-card__footer"><a routerLink="/profile">← Back to Profile</a></p>
  </div>
</div>
