<div class="profile-page">
  <div class="profile-card">

    <div *ngIf="success" class="profile-alert profile-alert--success">
      <span class="profile-alert__icon">✓</span>{{ success }}
    </div>
    <div *ngIf="error" class="profile-alert profile-alert--error">
      <span class="profile-alert__icon">✕</span>{{ error }}
    </div>

    <p class="profile-card__title">Edit Profile</p>
    <p class="profile-card__sub">Update your account information below.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="profile-group">
        <label class="profile-label">Full Name</label>
        <input type="text" formControlName="name" class="profile-input"
               placeholder="Your full name" />
        <div *ngIf="form.get('name')?.invalid && form.get('name')?.touched"
             class="profile-error">Name must be at least 2 characters</div>
      </div>

      <div class="profile-group">
        <label class="profile-label">Email Address</label>
        <input type="email" formControlName="email" class="profile-input"
               placeholder="you@example.com" />
        <div *ngIf="form.get('email')?.invalid && form.get('email')?.touched"
             class="profile-error">Valid email required</div>
      </div>

      <div class="profile-divider"></div>

      <button type="submit" class="profile-btn" [disabled]="loading">
        <span *ngIf="loading" class="profile-spinner"></span>
        {{ loading ? 'Saving...' : 'Save Changes' }}
      </button>
    </form>

    <p class="profile-footer">
      Want to change your password?
      <a routerLink="/change-password">Change Password →</a>
    </p>
  </div>
</div>

<style>
  .profile-page {
  min-height: calc(100vh - 64px);
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fff;
  padding: 2rem 1rem;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.profile-card {
  width: 100%;
  max-width: 420px;
  background: #fff;
  border: 1px solid #000;
  padding: 2.5rem 2rem;
  animation: profileSlideUp 0.5s cubic-bezier(.16,1,.3,1) both;
}

@keyframes profileSlideUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.profile-card__title {
  font-size: 22px;
  font-weight: 600;
  color: #000;
  letter-spacing: -0.5px;
  margin-bottom: 0.25rem;
}

.profile-card__sub {
  font-size: 13px;
  color: #666;
  margin-bottom: 2rem;
}

.profile-alert {
  padding: 10px 14px;
  font-size: 13px;
  border: 1px solid #000;
  margin-bottom: 1.25rem;
  display: flex;
  align-items: center;
  gap: 8px;
  animation: profileSlideUp 0.3s ease;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.profile-alert--success { background: #000; color: #fff; }
.profile-alert--error   { background: #fff; color: #000; }
.profile-alert__icon    { font-size: 14px; flex-shrink: 0; }

.profile-group {
  margin-bottom: 1.25rem;
  animation: profileSlideUp 0.5s cubic-bezier(.16,1,.3,1) both;
}

.profile-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #000;
  margin-bottom: 6px;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.profile-input {
  width: 100%;
  padding: 10px 12px;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  font-size: 14px;
  color: #000;
  background: #fff;
  border: 1px solid #000;
  border-radius: 0;
  outline: none;
  transition: box-shadow 0.2s;
}

.profile-input:focus {
  box-shadow: 3px 3px 0 #000;
}

.profile-input::placeholder { color: #aaa; }

.profile-error {
  font-size: 11px;
  color: #000;
  margin-top: 5px;
  padding-left: 10px;
  border-left: 2px solid #000;
  animation: profileFadeIn 0.2s ease;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

@keyframes profileFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.profile-divider {
  height: 1px;
  background: #000;
  margin: 1.5rem 0;
}

.profile-btn {
  width: 100%;
  padding: 12px;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  background: #000;
  color: #fff;
  border: 1px solid #000;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.15s, color 0.15s, transform 0.1s;
}

.profile-btn:hover   { background: #fff; color: #000; }
.profile-btn:active  { transform: scale(0.98); }
.profile-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.profile-spinner {
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: profileSpin 0.7s linear infinite;
  flex-shrink: 0;
}
.profile-btn:hover .profile-spinner {
  border-color: rgba(0,0,0,0.2);
  border-top-color: #000;
}

@keyframes profileSpin { to { transform: rotate(360deg); } }

.profile-footer {
  text-align: center;
  margin-top: 1.5rem;
  font-size: 12px;
  color: #666;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.profile-footer a {
  color: #000;
  font-weight: 600;
  text-decoration: none;
  border-bottom: 1px solid #000;
  padding-bottom: 1px;
  transition: opacity 0.15s;
}

.profile-footer a:hover { opacity: 0.5; }
</style>
