<div class="shop-layout container page-wrapper">
  
  <div class="filter-wrapper">
    <section class="filter-container">
      <div class="filter-header">
        <div class="filter-title-group">
          <h3 class="filter-title">Filters & Sorting</h3>
          <p class="filter-subtitle">Refine your search results</p>
        </div>
        <button *ngIf="activeFilters.length" (click)="clearAll()" class="btn-reset">
          Reset All
        </button>
      </div>

      <form [formGroup]="filterForm" class="filter-form">
        <div class="form-group">
          <label class="form-label">Keywords</label>
          <input type="text" formControlName="keyword" placeholder="Search products..." class="form-input">
        </div>

        <div class="form-group">
          <label class="form-label">Category</label>
          <select [value]="filterForm.value.typeId" (change)="onTypeChange($event)" class="form-select">
            <option value="">All Types</option>
            <option *ngFor="let t of taxonomy" [value]="t.id">{{ t.name }}</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Price Range (₹)</label>
          <div class="price-input-group">
            <input type="number" formControlName="minPrice" (input)="applyFilters()" placeholder="Min" class="form-input">
            <span class="price-separator">–</span>
            <input type="number" formControlName="maxPrice" (input)="applyFilters()" placeholder="Max" class="form-input">
          </div>
        </div>

        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" formControlName="inStockOnly" (change)="applyFilters()">
            <span>In Stock</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" (change)="applyFilters()">
            <span>Offers</span>
          </label>
        </div>
      </form>
    </section>
  </div>

  <main class="shop-main">
    
    <div *ngIf="loading" class="shop-loading">
      <div class="spinner"></div>
      <p>Loading products...</p>
    </div>

    <div *ngIf="!loading && products.length" class="product-grid">
      <div *ngFor="let p of products" class="product-card" [routerLink]="['/products', p.id]">
        <div class="product-card__img-wrap">
          <app-default-image 
            [imagePath]="p.imagePath" 
            [alt]="p.name" 
            imgClass="product-card__img">
          </app-default-image>
        </div>
        
        <div class="product-card__body">
          <h3 class="product-card__name">{{ p.name }}</h3>
          <p class="product-card__price">₹{{ p.price | number }}</p>
        </div>
      </div>
    </div>

    <div *ngIf="!loading && !products.length" class="empty-state">
      <div class="empty-icon">🔍</div>
      <h3>No products found</h3>
      <p>Try adjusting your filters or search terms.</p>
      <button class="btn-reset" (click)="clearAll()">Clear Filters</button>
    </div>

  </main>
</div>
