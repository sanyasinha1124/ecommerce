<div class="auth-page">
  <div class="auth-card fade-up">
    <div class="auth-card__logo">StyleHub</div>
    <p class="auth-card__subtitle">India's Fashion Destination</p>

    <div *ngIf="sessionExpired" class="alert alert-info">Your session expired. Please log in again.</div>
    <h2 class="auth-card__title">Welcome Back</h2>
    <div *ngIf="error" class="alert alert-error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" formControlName="email" class="form-control"
               [class.ng-invalid]="email.invalid && email.touched"
               placeholder="you@example.com" />
        <div *ngIf="email.invalid && email.touched" class="form-error">Please enter a valid email</div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" formControlName="password" class="form-control"
               [class.ng-invalid]="password.invalid && password.touched"
               placeholder="Enter your password" />
        <div *ngIf="password.invalid && password.touched" class="form-error">Password is required</div>
      </div>
      <div class="login__forgot"><a routerLink="/forgot-password">Forgot Password?</a></div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" [disabled]="loading">
        <span *ngIf="loading" class="spinner"></span>
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="auth-card__footer">New to StyleHub? <a routerLink="/register">Create Account</a></p>
  </div>
</div>
