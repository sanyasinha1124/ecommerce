<div class="auth-page">
  <div class="auth-card fade-up">
    <div class="auth-card__logo">StyleHub</div>
    <p class="auth-card__subtitle">Create your free account</p>
    <h2 class="auth-card__title">Join StyleHub</h2>
    <div *ngIf="error"   class="alert alert-error">{{ error }}</div>
    <div *ngIf="success" class="alert alert-success">{{ success }}</div>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" formControlName="name" class="form-control" placeholder="Your full name" />
        <div *ngIf="f['name'].invalid && f['name'].touched" class="form-error">Name must be at least 2 characters</div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" formControlName="email" class="form-control" placeholder="you@example.com" />
        <div *ngIf="f['email'].invalid && f['email'].touched" class="form-error">Please enter a valid email</div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" formControlName="password" class="form-control" placeholder="Min 8 chars, 1 uppercase, 1 number" />
        <div *ngIf="f['password'].invalid && f['password'].touched" class="form-error">Password must be 8+ chars with 1 uppercase & 1 number</div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" [disabled]="loading">
        <span *ngIf="loading" class="spinner"></span>
        {{ loading ? 'Creating...' : 'Create Account' }}
      </button>
    </form>
    <p class="auth-card__footer">Already have an account? <a routerLink="/login">Sign In</a></p>
  </div>
</div>
