<div class="auth-page">
  <div class="auth-card fade-up">
    <div class="auth-card__logo">StyleHub</div>
    <h2 class="auth-card__title">Reset Password</h2>
    <div *ngIf="error"   class="alert alert-error">{{ error }}</div>
    <div *ngIf="success" class="alert alert-success">{{ success }}</div>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label">Reset Code</label>
        <input type="text" formControlName="code" class="form-control" placeholder="Enter 6-digit code" maxlength="6" />
        <div *ngIf="form.get('code')?.invalid && form.get('code')?.touched" class="form-error">Valid code required</div>
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" formControlName="newPassword" class="form-control" placeholder="Min 8 chars, 1 uppercase, 1 number" />
        <div *ngIf="form.get('newPassword')?.invalid && form.get('newPassword')?.touched" class="form-error">Password must be 8+ chars with 1 uppercase & 1 number</div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" [disabled]="loading">
        <span *ngIf="loading" class="spinner"></span>
        {{ loading ? 'Resetting...' : 'Reset Password' }}
      </button>
    </form>
    <p class="auth-card__footer"><a routerLink="/login">← Back to Sign In</a></p>
  </div>
</div>
