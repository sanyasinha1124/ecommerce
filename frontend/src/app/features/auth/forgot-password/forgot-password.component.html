<div class="auth-page">
  <div class="auth-card fade-up">
    <div class="auth-card__logo">StyleHub</div>
    <h2 class="auth-card__title">Forgot Password?</h2>
    <p class="auth-card__subtitle">Enter your email to get a reset code</p>

    <ng-container *ngIf="!resetCode; else showCode">
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" formControlName="email" class="form-control" placeholder="you@example.com" />
          <div *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="form-error">Valid email required</div>
        </div>
        <button type="submit" class="btn btn-primary btn-full" [disabled]="loading">
          <span *ngIf="loading" class="spinner"></span>
          {{ loading ? 'Generating...' : 'Get Reset Code' }}
        </button>
      </form>
    </ng-container>

    <ng-template #showCode>
      <div class="alert alert-info" style="flex-direction:column;gap:12px;text-align:center;">
        <p>Your reset code is:</p>
        <p style="font-size:32px;font-weight:700;letter-spacing:8px;">{{ resetCode }}</p>
        <p style="font-size:12px;">Expires in 10 minutes.</p>
      </div>
      <a routerLink="/reset-password" [queryParams]="{email: email}"
         class="btn btn-primary btn-full" style="margin-top:16px;display:flex;">
        Enter Code & Reset Password →
      </a>
    </ng-template>

    <p class="auth-card__footer"><a routerLink="/login">← Back to Sign In</a></p>
  </div>
</div>
